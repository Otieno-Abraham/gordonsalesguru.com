name: Deploy Gordon Sales Guru

on:
  push:
    branches: [main]
  schedule:
    # 06:00 East Africa Time (03:00 UTC) daily — unlocks each day's scheduled
    # blog post and refreshes the sitemap with zero manual work.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# Allow the workflow to push the built site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pymupdf pillow

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Node deps
        run: npm ci

      - name: Build (runs prebuild asset scripts, then exports + sitemap)
        run: npm run build
        env:
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ID }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_FACEBOOK_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_FACEBOOK_PIXEL_ID }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ secrets.NEXT_PUBLIC_CALENDLY_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_EMAIL: ${{ secrets.NEXT_PUBLIC_EMAIL }}
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # Custom domain disabled until gordonsalesguru.com is bought + DNS set.
          # To go live on the domain: re-create public/CNAME with "gordonsalesguru.com",
          # restore the line below, and clear the NEXT_PUBLIC_BASE_PATH secret (set
          # NEXT_PUBLIC_SITE_URL back to https://gordonsalesguru.com).
          # cname: gordonsalesguru.com
