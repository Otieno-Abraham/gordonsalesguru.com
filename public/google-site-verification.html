<!doctype html>
<!--
  Google Search Console verification placeholder.

  When you verify the site in Google Search Console using the "HTML file"
  method, Google gives you a file named like:
      google1234567890abcdef.html
  containing a single line:
      google-site-verification: google1234567890abcdef.html

  Drop that exact file into this /public folder (keep its Google-given name)
  and redeploy. This file is just a friendly placeholder so the path exists.

  Alternatively, use the "HTML tag" method and add the verification meta tag —
  see the README for step-by-step instructions.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Google site verification — Gordon Sales Guru</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    google-site-verification placeholder — replace with the file Google provides.
  </body>
</html>
